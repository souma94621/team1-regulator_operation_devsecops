version: '3.8'

services:
  regulator_component:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=regulator_component
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  regulator_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_ID=regulator
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - HEALTH_PORT=8088
      - PYTHONUNBUFFERED=1
    ports:
      - "8088:8088"
    networks:
      - drones_net
    restart: unless-stopped

  regulator_journal:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=regulator_journal
      - JOURNAL_TOPIC=components.regulator.journal
      - BROKER_TYPE=${BROKER_TYPE:-mqtt}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}
