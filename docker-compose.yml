services:
  regulator_component:
    build:
      context: ../..
      dockerfile: systems/regulator/src/regulator_component/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=regulator_component
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${COMPONENT_USER:-${ADMIN_USER:-admin}}
      - BROKER_PASSWORD=${COMPONENT_PASSWORD:-${ADMIN_PASSWORD:-admin123}}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.regulator.journal}
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

  regulator_gateway:
    build:
      context: ../..
      dockerfile: systems/regulator/src/gateway/docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - SYSTEM_ID=regulator
      - SYSTEM_NAMESPACE=${SYSTEM_NAMESPACE:-}
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - HEALTH_PORT=8088
      - JOURNAL_TOPIC=${JOURNAL_TOPIC:-components.regulator.journal}
      - PYTHONUNBUFFERED=1
    ports:
      - "${REGULATOR_PORT:-8088}:8088"
    networks:
      - drones_net
    restart: unless-stopped

  regulator_journal:
    build:
      context: ../..
      dockerfile: sdk/journal_docker/Dockerfile
    profiles: ["kafka", "mqtt"]
    environment:
      - COMPONENT_ID=regulator_journal
      - JOURNAL_TOPIC=components.regulator.journal
      - ANALYTICS_URL=${ANALYTICS_URL:-}
      - ANALYTICS_API_KEY=${ANALYTICS_API_KEY:-}
      - ANALYTICS_SERVICE_NAME=regulator
      - ANALYTICS_SERVICE_ID=1
      - BROKER_TYPE=${BROKER_TYPE:-kafka}
      - BROKER_USER=${ADMIN_USER:-admin}
      - BROKER_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    networks:
      - drones_net
    restart: unless-stopped

networks:
  drones_net:
    external: true
    name: ${DOCKER_NETWORK:-drones_net}